<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>آزمون‌ساز معلم</title>
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#1D3E73" />
<link rel="icon" href="/icons/icon-192.png" />
<link rel="apple-touch-icon" href="/icons/icon-192.png" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800;900&display=swap');
  * { box-sizing: border-box; }
  html, body, #root { height: 100%; margin: 0; }
  body { font-family: 'Vazirmatn', 'Segoe UI', Tahoma, sans-serif; background: #F8FAFC; }
  table { direction: rtl; }
  select { font-family: inherit; }
  ::selection { background: #BFDBFE; }
</style>
</head>
<body>
<div id="root"></div>
<script>
  var overlay = null;
  function showError(title, msg, loc) {
    if (!overlay) {
      overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:999999;max-height:80vh;overflow:auto;background:#fff;border-bottom:4px solid #b91c1c;padding:16px;direction:ltr;text-align:left;';
      document.body.appendChild(overlay);
    }
    var box = document.createElement('pre');
    box.style.cssText = 'white-space:pre-wrap;margin:0 0 12px 0;color:#b91c1c;font-family:monospace;font-size:12px;';
    box.textContent = title + '\n' + msg + (loc ? ('\n' + loc) : '');
    overlay.appendChild(box);
  }
  window.addEventListener('error', function (e) {
    var msg = (e && e.message) ? e.message : String(e);
    var loc = (e && e.filename) ? (e.filename + ':' + e.lineno + ':' + e.colno) : '';
    showError('JS ERROR:', msg, loc);
  });
  window.addEventListener('unhandledrejection', function (e) {
    var reason = e && e.reason;
    var msg = reason && reason.message ? reason.message : String(reason);
    showError('UNHANDLED PROMISE REJECTION:', msg, '');
  });
</script>


<!--
  This app is split into multiple files under js/ so that future edits only
  need to touch the one relevant file instead of the whole app:
    js/icons.js          - all icon components (+ the React hooks destructure)
    js/ui.js             - shared KV/data helpers + shared UI primitives (Button, Modal, Field, Sidebar, TopBar, etc.)
    js/auth-screens.js   - login / register / forgot-password / reset-password
    js/screens-exams.js  - dashboard, exams list, per-exam questions, question bank
    js/screens-taking.js - student exam-taking flow, results, essay grading
    js/screens-classes.js- classes, roster, students, messages, student portal, settings
    js/screens-admin.js  - school-admin dashboard (list/create/delete teacher accounts)
    js/app.js            - root EduExamApp component + ReactDOM render (must load LAST)
  All files are loaded as classic (non-module) text/babel scripts, so they
  share one global scope - order matters only in that app.js must be last.
-->
<script type="text/babel" data-presets="react" src="js/icons.js"></script>
<script type="text/babel" data-presets="react" src="js/ui.js"></script>
<script type="text/babel" data-presets="react" src="js/auth-screens.js"></script>
<script type="text/babel" data-presets="react" src="js/screens-exams.js"></script>
<script type="text/babel" data-presets="react" src="js/screens-taking.js"></script>
<script type="text/babel" data-presets="react" src="js/screens-classes.js"></script>
<script type="text/babel" data-presets="react" src="js/screens-admin.js"></script>
<script type="text/babel" data-presets="react" src="js/app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('/sw.js').catch(function () {
        /* offline support just won't be available this session — the app
           still works fully online without it */
      });
    });
  }
</script>
</body>
</html>
